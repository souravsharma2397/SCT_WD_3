<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Tic Tac Toe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>🎮 Tic Tac Toe</h1>

    <div class="mode-selection">
        <button id="pvpBtn">👥 Player vs Player</button>
        <button id="cpuBtn">🤖 Player vs Computer</button>
    </div>

    <div class="scoreboard">
        <div class="score-card">
            ❌ X Score
            <span id="xScore">0</span>
        </div>

        <div class="score-card">
            ⭕ O Score
            <span id="oScore">0</span>
        </div>
    </div>

    <h2 id="status">Player X Turn</h2>

    <div class="board">
        <div class="cell" data-index="0"></div>
        <div class="cell" data-index="1"></div>
        <div class="cell" data-index="2"></div>
        <div class="cell" data-index="3"></div>
        <div class="cell" data-index="4"></div>
        <div class="cell" data-index="5"></div>
        <div class="cell" data-index="6"></div>
        <div class="cell" data-index="7"></div>
        <div class="cell" data-index="8"></div>
    </div>

    <div class="controls">
        <button id="resetBtn">🔄 Reset Board</button>
        <button id="newGameBtn">🆕 New Game</button>
    </div>

</div>

<!-- Winner Popup -->
<div class="popup" id="winnerPopup">
    <div class="popup-content">
        <h2 id="winnerText"></h2>
        <button onclick="closePopup()">Play Again</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
